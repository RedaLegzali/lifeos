# Contrôle qualité : lint, tests, build sur chaque push et PR.
# Le DÉPLOIEMENT est assuré par Cloudflare Workers Builds, connecté
# directement au dépôt (il build et publie chaque push sur main).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Vérification (lint · tests · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Installation
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build (typecheck + production)
        run: npm run build

      - name: Publier l'artefact de build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
